<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>Luna Tale • Order</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="LUNA TALE ASST." />
  <link rel="shortcut icon" href="https://lh3.googleusercontent.com/d/1urdy_55N1YdX19KKqtIFrk0_QotCYt4K" />

  <!-- เร่งการเชื่อมต่อ -->
  <link rel="preconnect" href="https://script.google.com" crossorigin>
  <link rel="preconnect" href="https://static.line-scdn.net" crossorigin>

  <style>
    html,body{height:100%;margin:0;background:#fff;font-family:system-ui,Arial}
    .frame{width:100%;height:100dvh;border:0;display:none;background:#fff}
  </style>
</head>
<body>
  <!-- ไม่มีสปินเนอร์/ข้อความโหลด -->
  <iframe id="myIframe" class="frame" referrerpolicy="strict-origin-when-cross-origin"></iframe>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    // === ค่าจริงของโปรเจกต์คุณ ===
    const GAS_EXEC_URL = 'https://script.google.com/macros/s/AKfycbxhEmEohTbGpyk3bEYThyKFy1w-WpfVU0q4khtg0hF-ltgFoqOe5UP1ESfw7TG0zEY/exec';
    const MY_LIFF_ID   = '2010102074-dTlWLWrE';

    const iframe = document.getElementById('myIframe');

    (async () => {
      // เก็บพารามิเตอร์เดิมไว้ (ลบ uid เดิมออกกันซ้ำซ้อน)
      const usp = new URLSearchParams(location.search);
      usp.delete('uid');

      // redirectUri แบบสะอาด (ไม่มี hash / uid ซ้ำ)
      const REDIRECT_URI = location.origin + location.pathname + (usp.toString() ? `?${usp.toString()}` : '');

      try {
        // บังคับล็อกอินทุกกรณี
        await liff.init({ liffId: MY_LIFF_ID, withLoginOnExternalBrowser: true });

        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: REDIRECT_URI });
          return; // จะรีไดเรกต์ไปล็อกอินแล้วกลับมา
        }

        // ล็อกอินแล้ว → ดึง userId
        const profile      = await liff.getProfile().catch(() => ({}));
        const decodedToken = liff.getDecodedIDToken?.() || {};
        const userId       = decodedToken.sub || profile.userId || '';

        // ส่ง log ไป GAS (ไม่บล็อค UI)
        if (userId) {
          fetch(GAS_EXEC_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
              action: 'logLiff',
              userId,
              displayName: profile.displayName || '',
              pictureUrl: profile.pictureUrl || ''
            })
          }).catch(()=>{});
        }

        // เปิด iframe พร้อม uid
        const params = new URLSearchParams(usp);
        if (userId) params.set('uid', userId);
        const url = GAS_EXEC_URL + (params.toString() ? `?${params.toString()}` : '');
        iframe.src = url;
        iframe.style.display = 'block';

      } catch (e) {
        // Fallback: ถ้า LIFF ใช้งานไม่ได้ ให้เปิด iframe เปล่าเพื่อไม่ให้หน้าว่าง
        iframe.src = GAS_EXEC_URL;
        iframe.style.display = 'block';
      }
    })();
  </script>

  <script src="./redirect.js"></script>

  
</body>
</html>
